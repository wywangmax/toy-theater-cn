<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玩具学堂 | 中文互动学习游戏</title>
    <meta
      name="description"
      content="一个中文版互动学习游戏入口，覆盖数学、语文、基础英语、艺术、音乐、益智游戏和教师工具。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="玩具学堂 | 中文互动学习游戏" />
    <meta
      property="og:description"
      content="像玩具一样排列的中文互动学习游戏，打开就能玩。"
    />
    <meta property="og:url" content="https://wywangmax.github.io/toy-theater-cn/" />
    <meta
      property="og:image"
      content="https://wywangmax.github.io/toy-theater-cn/share-card.svg"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#ffd166" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="玩具学堂首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <rect x="8" y="12" width="20" height="20" rx="5"></rect>
            <rect x="36" y="12" width="20" height="20" rx="5"></rect>
            <rect x="22" y="34" width="20" height="20" rx="5"></rect>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>玩具学堂</strong>
          <small>中文互动游戏</small>
        </span>
      </a>

      <nav class="top-nav" aria-label="主导航">
        <a href="#featured">推荐</a>
        <a href="#games">全部游戏</a>
        <a href="#teacherTools">教师工具</a>
        <a href="#playLab">开始玩</a>
      </nav>

      <form class="header-search" role="search">
        <label for="siteSearch">搜索游戏</label>
        <input id="siteSearch" type="search" placeholder="搜索：分数、拼音、钢琴、迷宫" />
      </form>
    </header>

    <main id="top">
      <section class="hero-band" aria-labelledby="heroTitle">
        <div class="hero-logo" aria-hidden="true">
          <span>玩</span>
          <span>具</span>
          <span>学</span>
          <span>堂</span>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">中文版 · 免费互动学习游戏</p>
          <h1 id="heroTitle">点一个小玩具，马上开始玩。</h1>
          <p>数学、语文、基础英语、艺术、音乐、益智和课堂工具都放在一面游戏墙里。</p>
        </div>
      </section>

      <section class="entry-band" aria-label="学习入口">
        <button class="entry-card" type="button" data-entry-subject="math">
          <span>数学</span>
          <strong>Math</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="chinese">
          <span>语文</span>
          <strong>Language</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="english">
          <span>英语</span>
          <strong>English</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="art">
          <span>艺术</span>
          <strong>Art</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="music">
          <span>音乐</span>
          <strong>Music</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="puzzle">
          <span>益智</span>
          <strong>Puzzles</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="game">
          <span>游戏</span>
          <strong>Games</strong>
        </button>
        <button class="entry-card" type="button" data-entry-subject="teacher">
          <span>教师工具</span>
          <strong>Tools</strong>
        </button>
      </section>

      <section class="filter-section" id="grades" aria-label="筛选活动">
        <div>
          <p class="eyebrow">分类</p>
          <div class="chip-row" id="subjectFilters"></div>
        </div>
        <div>
          <p class="eyebrow">年级</p>
          <div class="chip-row" id="gradeFilters"></div>
        </div>
        <div>
          <p class="eyebrow">模式</p>
          <div class="chip-row" id="modeFilters">
            <button class="filter-chip active" type="button" data-mode="child">孩子模式</button>
            <button class="filter-chip" type="button" data-mode="teacher">老师模式</button>
          </div>
        </div>
      </section>

      <section class="featured-section" id="featured" aria-labelledby="featuredTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Featured</p>
            <h2 id="featuredTitle">推荐游戏</h2>
          </div>
        </div>
        <div class="daily-list" id="dailyList" aria-label="推荐游戏"></div>
      </section>

      <section class="games-section" id="games" aria-labelledby="gamesTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Game Shelf</p>
            <h2 id="gamesTitle">全部游戏</h2>
          </div>
          <p id="gameCount" aria-live="polite">全部游戏</p>
        </div>
        <div class="game-grid" id="gameGrid"></div>
      </section>

      <section class="teacher-band" id="teacherTools" aria-labelledby="teacherToolsTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Teacher Tools</p>
            <h2 id="teacherToolsTitle">老师上课常用</h2>
          </div>
          <p>投屏、大字号、少等待。</p>
        </div>
        <div class="tool-rail" id="teacherRail"></div>
      </section>

      <section class="lab-section" id="playLab" aria-labelledby="labTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Play</p>
            <h2 id="labTitle">开始玩</h2>
          </div>
          <div class="play-actions">
            <button type="button" id="soundToggle" aria-pressed="true">声音开</button>
            <button type="button" id="fullscreenButton">全屏</button>
          </div>
        </div>

        <article class="play-shell" id="activityPanel" aria-live="polite"></article>
      </section>
    </main>

    <footer class="site-footer">
      <p>玩具学堂 · 数学 / 语文 / 英语 / 艺术 / 音乐 / 益智 / 游戏 / 教师工具</p>
      <a href="#top">回到顶部</a>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
